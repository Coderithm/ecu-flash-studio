<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ECU Flash Tool — Diagnostic & Flash Studio</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #020617; font-family: 'Segoe UI', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #1e293b; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .animate-pulse { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ─── Mock Data ────────────────────────────────────────────────────────────────
const MOCK_SW_VERSION = "SW_ECU_v3.4.2-release";
const MOCK_NVM_DATA = [
  { address: "0x0000", label: "Odometer",          value: "0x00123456", raw: "18 00 01 23 45 67" },
  { address: "0x0010", label: "VIN Lock",           value: "0x01",       raw: "01" },
  { address: "0x0020", label: "ECU Serial No.",     value: "0xABCD1234", raw: "AB CD 12 34" },
  { address: "0x0030", label: "Flash Cycle Count",  value: "0x0009",     raw: "00 09" },
  { address: "0x0040", label: "Last Error Code",    value: "0x0000",     raw: "00 00" },
  { address: "0x0050", label: "Boot SW Version",    value: "0x0102",     raw: "01 02" },
  { address: "0x0060", label: "Calib. Checksum",    value: "0xF3A1",     raw: "F3 A1" },
  { address: "0x0070", label: "Diag Session",       value: "0x03",       raw: "03" },
];
const MOCK_INTERRUPTION_TESTS = [
  { id: 1, name: "Power Cut During Erase Phase",       status: "idle" },
  { id: 2, name: "Power Cut During Write Phase",       status: "idle" },
  { id: 3, name: "CAN Bus Loss During Flash Transfer", status: "idle" },
  { id: 4, name: "Timeout During Programming Session", status: "idle" },
  { id: 5, name: "Invalid CRC Mid-Flash",              status: "idle" },
  { id: 6, name: "Memory Full Simulation",             status: "idle" },
];
const INITIAL_FLASH_LOG = [
  { id: 1, swFile: "SW_ECU_v3.2.0.hex", timestamp: "2026-04-04 09:12:03", duration: "4m 32s", status: "success" },
  { id: 2, swFile: "SW_ECU_v3.3.1.hex", timestamp: "2026-04-04 14:05:47", duration: "4m 28s", status: "success" },
  { id: 3, swFile: "SW_ECU_v3.4.0.hex", timestamp: "2026-04-05 10:31:22", duration: "4m 45s", status: "failed"  },
  { id: 4, swFile: "SW_ECU_v3.4.2.hex", timestamp: "2026-04-05 11:00:09", duration: "4m 30s", status: "success" },
];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function now() {
  return new Date().toLocaleString("en-IN", { hour12: false }).replace(",", "");
}
function fmtMs(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}m ${s % 60}s`;
}

function Badge({ type }) {
  const map = {
    success:     { bg: "#065f46", color: "#6ee7b7", border: "#059669" },
    failed:      { bg: "#7f1d1d", color: "#fca5a5", border: "#dc2626" },
    running:     { bg: "#78350f", color: "#fde68a", border: "#d97706" },
    interrupted: { bg: "#7c2d12", color: "#fdba74", border: "#ea580c" },
    idle:        { bg: "#1e293b", color: "#94a3b8", border: "#334155" },
  };
  const s = map[type] || map.idle;
  return (
    <span style={{
      background: s.bg, color: s.color,
      border: `1px solid ${s.border}`,
      borderRadius: 9999, padding: "2px 10px",
      fontSize: 10, fontWeight: 700,
      letterSpacing: "0.08em", textTransform: "uppercase"
    }}>{type}</span>
  );
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
const NAV = [
  { id: "dashboard",    icon: "⬛", label: "Dashboard"          },
  { id: "multiflash",   icon: "🔁", label: "Multi-Flash"        },
  { id: "nvm",          icon: "💾", label: "NVM Data"            },
  { id: "flashlog",     icon: "📋", label: "Flash Log"           },
  { id: "interruption", icon: "⚡", label: "Interruption Tests"  },
 { id: "cantrace", icon: "🚌", label: "CAN Trace" },
];

function Sidebar({ active, setActive }) {
  return (
    <aside style={{
      width: 220, minHeight: "100vh",
      background: "#0f172a", borderRight: "1px solid #1e293b",
      display: "flex", flexDirection: "column", padding: "24px 0"
    }}>
      <div style={{ padding: "0 20px", marginBottom: 24 }}>
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.15em", color: "#475569", textTransform: "uppercase", marginBottom: 4 }}>ECU Flash Tool</div>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#f1f5f9", lineHeight: 1.3 }}>Diagnostic<br/>& Flash Studio</div>
      </div>
      {NAV.map(n => (
        <button key={n.id} onClick={() => setActive(n.id)} style={{
          display: "flex", alignItems: "center", gap: 12,
          padding: "10px 20px", fontSize: 13, fontWeight: 500,
          cursor: "pointer", border: "none", borderLeft: active === n.id ? "2px solid #3b82f6" : "2px solid transparent",
          background: active === n.id ? "rgba(59,130,246,0.12)" : "transparent",
          color: active === n.id ? "#93c5fd" : "#94a3b8",
          transition: "all 0.15s", textAlign: "left", width: "100%"
        }}>
          <span style={{ fontSize: 15 }}>{n.icon}</span>{n.label}
        </button>
      ))}
      <div style={{ marginTop: "auto", padding: "16px 20px", borderTop: "1px solid #1e293b" }}>
        <div style={{ fontSize: 11, color: "#475569" }}>Simulation Mode</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#34d399", display: "inline-block" }} className="animate-pulse"></span>
          <span style={{ fontSize: 11, color: "#34d399" }}>ECU Connected</span>
        </div>
      </div>
    </aside>
  );
}

// ─── Card / Section helpers ───────────────────────────────────────────────────
function Card({ children, style }) {
  return (
    <div style={{ background: "#1e293b", borderRadius: 12, padding: 20, border: "1px solid #334155", ...style }}>
      {children}
    </div>
  );
}
function SectionLabel({ children }) {
  return <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.15em", color: "#64748b", textTransform: "uppercase", marginBottom: 12 }}>{children}</div>;
}
function Btn({ children, onClick, disabled, color = "#2563eb", style }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background: disabled ? "#334155" : color, color: disabled ? "#64748b" : "#fff",
      border: "none", borderRadius: 8, padding: "8px 16px",
      fontSize: 12, fontWeight: 700, cursor: disabled ? "not-allowed" : "pointer",
      transition: "background 0.15s", ...style
    }}>{children}</button>
  );
}
function MonoInput({ value, onChange, placeholder, disabled, style }) {
  return (
    <input value={value} onChange={onChange} placeholder={placeholder} disabled={disabled} style={{
      background: "#0f172a", border: "1px solid #334155", borderRadius: 8,
      padding: "8px 12px", fontSize: 12, fontFamily: "monospace", color: "#f1f5f9",
      outline: "none", width: "100%", ...style
    }} />
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ flashCount, flashOp }) {
 const [swVersion, setSwVersion] = useState("—");
 const [reading, setReading] = useState(false);
 const [flashReading, setFlashReading] = useState(false);
 const [localFC, setLocalFC] = useState("—");
 const [cmd, setCmd] = useState("");
 const [cmdLog, setCmdLog] = useState([]);
 const [sending, setSending] = useState(false);
 const QUICK = ["0x10 03", "0x22 F1 80", "0x27 01", "0x31 01 FF 00", "0x3E 00"]; 

 function readSW() {
  setReading(true);
  setTimeout(() => { setSwVersion(MOCK_SW_VERSION); setReading(false); }, 1400);
 }
 function readFC() {
  setFlashReading(true);
  setTimeout(() => { setLocalFC(flashCount.toString()); setFlashReading(false); }, 1000);
 }
 function sendCmd() {
  if (!cmd.trim()) return;
  setSending(true);
  const entry = { cmd: cmd.trim(), ts: now(), response: null };
  const snap = { ...entry };
  setTimeout(() => {
   let rx = `7F ${cmd.trim().substring(0, 2)} 31`;
   if (cmd.includes("22") || cmd.includes("3E")) rx = `62 ${cmd.trim().split(" ").slice(1).join(" ")} AA BB`;
   setCmdLog(l => [{ ...snap, response: rx }, ...l].slice(0, 20));
   setSending(false);
  }, 900);
  setCmdLog(l => [entry, ...l].slice(0, 20));
  setCmd("");
 }

 const opRunning = !!flashOp?.running;
 const opPct = Math.min(100, Math.max(0, flashOp?.progress ?? 0));
 const opElapsed = flashOp?.elapsedMs ?? 0;
 const opCycle = flashOp?.cycle ?? 0;
 const opTotal = flashOp?.total ?? 0;
 const opFile = flashOp?.swFile ?? "—";

 return (
  <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
   <h2 style={{ color: "#f1f5f9", margin: 0, fontSize: 20, fontWeight: 700 }}>Dashboard</h2>

   <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
    {/* SW Version */}
    <Card>
     <SectionLabel>SW Version</SectionLabel>
     <div style={{ fontFamily: "monospace", fontSize: 12, color: "#93c5fd", background: "#0f172a", borderRadius: 6, padding: "8px 12px", marginBottom: 12, minHeight: 34 }}>
      {reading ? <span className="animate-pulse" style={{ color: "#475569" }}>Reading…</span> : swVersion}
     </div>
     <Btn onClick={readSW} disabled={reading} style={{ width: "100%" }}>Read SW Version</Btn>
    </Card>

    {/* Flash Count */}
    <Card>
     <SectionLabel>Flash Cycle Count</SectionLabel>
     <div style={{ fontFamily: "monospace", fontSize: 36, fontWeight: 700, color: "#34d399", background: "#0f172a", borderRadius: 6, padding: "4px 12px", marginBottom: 12, textAlign: "center", minHeight: 50, lineHeight: "50px" }}>
      {flashReading ? <span className="animate-pulse" style={{ fontSize: 12, color: "#475569", fontWeight: 400 }}>Reading…</span> : localFC}
     </div>
     <Btn onClick={readFC} disabled={flashReading} color="#065f46" style={{ width: "100%" }}>Read Flash Count</Btn>
    </Card>

    {/* ECU Status */}
    <Card>
     <SectionLabel>ECU Status</SectionLabel>
     {[["Session","Extended Diagnostic"],["Protocol","UDS over CAN"],["CAN ID (TX)","0x7E0"],["CAN ID (RX)","0x7E8"]].map(([k,v]) => (
      <div key={k} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
       <span style={{ fontSize: 12, color: "#64748b" }}>{k}</span>
       <span style={{ fontSize: 11, fontFamily: "monospace", color: "#e2e8f0" }}>{v}</span>
      </div>
     ))}
    </Card>

    {/* Current Flashing Operation Time */}
    <Card>
     <SectionLabel>Current Flash Operation</SectionLabel>

     {!opRunning ? (
      <div style={{ fontSize: 12, color: "#475569", padding: "8px 0" }}>No flashing operation running.</div>
     ) : (
      <>
       <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
        <div style={{ fontFamily: "monospace", fontSize: 14, fontWeight: 700, color: "#93c5fd" }}>{fmtMs(opElapsed)}</div>
        <div style={{ fontSize: 11, color: "#64748b" }}>{opCycle}/{opTotal}</div>
       </div>
       <div style={{ width: "100%", background: "#334155", borderRadius: 9999, height: 10, marginBottom: 8 }}>
        <div style={{ width: `${opPct}%`, height: 10, background: "#3b82f6", borderRadius: 9999, transition: "width 0.15s" }} />
       </div>
       <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#64748b" }}>
        <span style={{ fontFamily: "monospace", color: "#94a3b8" }}>{opFile}</span>
        <span>{Math.round(opPct)}%</span>
       </div>
      </>
     )}
    </Card>
   </div>

   {/* Application Command */}
   <Card>
    <SectionLabel>Application Command</SectionLabel>
    <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
     <MonoInput value={cmd} onChange={e => setCmd(e.target.value)}
      onKeyDown={e => e.key === "Enter" && sendCmd()}
      placeholder="e.g. 0x10 03 or 22 F1 80" style={{ flex: 1 }} />
     <Btn onClick={sendCmd} disabled={sending || !cmd.trim()}>{sending ? "Sending…" : "Send"}</Btn>
    </div>
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
     {QUICK.map(c => (
      <button key={c} onClick={() => setCmd(c)} style={{
       background: "#334155", color: "#94a3b8", border: "none", borderRadius: 6,
       padding: "3px 8px", fontSize: 11, fontFamily: "monospace", cursor: "pointer"
      }}>{c}</button>
     ))}
    </div>
    <div style={{ background: "#0f172a", borderRadius: 8, border: "1px solid #334155", maxHeight: 160, overflowY: "auto" }}>
     {cmdLog.length === 0
      ? <div style={{ padding: 12, fontSize: 11, color: "#475569" }}>No commands sent yet.</div>
      : cmdLog.map((e, i) => (
       <div key={i} style={{ display: "flex", gap: 12, padding: "6px 12px", borderBottom: "1px solid #1e293b", fontSize: 11, fontFamily: "monospace", background: i === 0 ? "rgba(255,255,255,0.02)" : "transparent" }}>
        <span style={{ color: "#475569", width: 130, flexShrink: 0 }}>{e.ts}</span>
        <span style={{ color: "#fde68a" }}>TX: {e.cmd}</span>
        <span style={{ color: e.response ? (e.response.startsWith("7F") ? "#fca5a5" : "#6ee7b7") : "#475569" }}>
         {e.response ? `RX: ${e.response}` : "…waiting"}
        </span>
       </div>
      ))
     }
    </div>
   </Card>
  </div>
 );
}
// ─── MULTI-FLASH ──────────────────────────────────────────────────────────────
function MultiFlash({ flashCount, setFlashCount, setFlashLog, setFlashOp, pushTrace }) {
 const FILES = ["SW_ECU_v3.4.2.hex","SW_ECU_v3.3.1.hex","SW_ECU_v3.2.0.hex","BOOTLOADER_v1.1.hex"];

 // 10-row flashing plan (user-selectable sequence)
 const [plan, setPlan] = useState(() => (
 Array.from({ length: 10 }, (_, i) => ({
  enabled: i === 0,
  file: i === 0 ? "SW_ECU_v3.4.2.hex" : "",
  // Option A: selection order decides flashing order; changing file makes it "newly selected"
  selectedAt: i === 0 ? Date.now() : null,
  priority: i === 0 ? 1 : null
 }))
 ));

 // How many times to repeat the selected sequence
 const [times, setTimes] = useState(1);

  useEffect(() => {
   setPlan(p => normalizePriorities(p));
  }, []);

 useEffect(() => {
  // Simulated ECU-side NVM save cycle storage (option 1: read from ECU)
  if (ecuNvmSaveCycleRef.current === null) ecuNvmSaveCycleRef.current = flashCount;
  if (!running) ecuNvmSaveCycleRef.current = flashCount;
 }, [flashCount, running]);

 const [running, setRunning] = useState(false);
 const [sessionLog, setSessionLog] = useState([]);
 const [current, setCurrent] = useState(0);
 const [totalOps, setTotalOps] = useState(0);
 const [progress, setProgress] = useState(0);
 const [elapsedMs, setElapsedMs] = useState(0);
 const [nvmSaveCycleDec, setNvmSaveCycleDec] = useState("—");
 const [nvmSaveCycleHex, setNvmSaveCycleHex] = useState("—");
 const [nvmLastRead, setNvmLastRead] = useState("—");
 const [nvmDid, setNvmDid] = useState("F1 90");
 const [nvmReading, setNvmReading] = useState(false);
 const [nvmAutoRead, setNvmAutoRead] = useState(true);
 const [nvmWriteData, setNvmWriteData] = useState("00 00");
 const [nvmWriting, setNvmWriting] = useState(false);
 const [nvmWriteStatus, setNvmWriteStatus] = useState("—");
 const [nvmCounterLog, setNvmCounterLog] = useState([]);
 const [nvmErr, setNvmErr] = useState("");
 const ecuNvmSaveCycleRef = useRef(null);

 const timerRef = useRef(null);
 const startRef = useRef(null);
 const opsRef = useRef([]);

 function normalizePriorities(rows) {
  const selected = rows
   .map((r, idx) => ({ ...r, __idx: idx }))
   .filter(r => r.enabled && r.file && r.selectedAt);

  selected.sort((a, b) => a.selectedAt - b.selectedAt);

  const pri = new Map(selected.map((r, i) => [r.__idx, i + 1]));
  return rows.map((r, idx) => ({ ...r, priority: pri.get(idx) || null }));
 }

 function updatePlanRow(i, patch) {
  setPlan(p => {
   const prev = p[i];
   const next = { ...prev, ...patch };

   // Option A: Changing the hex file makes it a new selection (moves to latest priority)
   if (Object.prototype.hasOwnProperty.call(patch, 'file')) {
    next.selectedAt = patch.file ? Date.now() : null;
   }

   // If row is disabled, remove it from ordering
   if (Object.prototype.hasOwnProperty.call(patch, 'enabled') && !patch.enabled) {
    next.selectedAt = null;
   }

   // If row is enabled and already has a file but no timestamp, stamp it
   if (
    Object.prototype.hasOwnProperty.call(patch, 'enabled') &&
    patch.enabled &&
    next.file &&
    !next.selectedAt
   ) {
    next.selectedAt = Date.now();
   }

   const rows = p.map((r, idx) => (idx === i ? next : r));
   return normalizePriorities(rows);
  });
 }

 function buildOps() {
  // Flashing sequence follows the order in which hex files were selected (Option A)
  const seq = [...plan]
   .filter(r => r.enabled && r.file)
   .sort((a, b) => (a.selectedAt || 0) - (b.selectedAt || 0))
   .map(r => r.file);

  const ops = [];
  for (let t = 0; t < times; t++) {
   for (const f of seq) ops.push(f);
  }
  return ops;
 }

 async function readNvmSaveCycle(reason = "Manual") {
  if (nvmReading) return;
  const did = (nvmDid || "").trim().toUpperCase();
  if (!did) { setNvmErr("DID is required"); return; }
  setNvmErr("");
  setNvmReading(true);

  const tx = (`22 ${did}`).replace(/\s+/g, ' ').trim();
  pushTrace && pushTrace({ dir: "TX", canId: "0x7E0", data: tx, note: `ReadDataByIdentifier (${reason})` });

  // Simulation: ECU responds with the value held in ecuNvmSaveCycleRef (2 bytes)
  await new Promise(res => setTimeout(res, 650));
  const val = Number(ecuNvmSaveCycleRef.current ?? 0);
  const hex = `0x${val.toString(16).toUpperCase().padStart(4, '0')}`;
  const rx = (`62 ${did} ${hex.replace('0x','').match(/.{1,2}/g).join(' ')}`).replace(/\s+/g, ' ').trim();
  pushTrace && pushTrace({ dir: "RX", canId: "0x7E8", data: rx, note: "Positive response" });

  setNvmSaveCycleDec(val.toString());
  setNvmSaveCycleHex(hex);
  setNvmLastRead(now());
  setNvmCounterLog(l => [{ ts: now(), did, dec: val.toString(), hex, reason }, ...l].slice(0, 200));
 setNvmReading(false);
 }




 function parseHexBytes(str) {
  const s = (str || '').trim().toUpperCase().replace(/0X/g,'');
  if (!s) return [];
  return s.split(/\s+/).filter(Boolean).map(b => {
    const bb = b.replace(/[^0-9A-F]/g,'');
    return bb ? parseInt(bb, 16) : NaN;
  }).filter(x => !Number.isNaN(x));
 }

 async function writeThenReadNvm(reason = 'Manual') {
  if (nvmWriting || nvmReading) return;
  const did = (nvmDid || '').trim().toUpperCase();
  if (!did) { setNvmErr('DID is required'); return; }
  const bytes = parseHexBytes(nvmWriteData);
  if (bytes.length === 0) { setNvmErr('Write data bytes are required'); return; }
  setNvmErr('');
  setNvmWriting(true);
  setNvmWriteStatus('Writing…');
  const tx = (`2E ${did} ${bytes.map(b => b.toString(16).toUpperCase().padStart(2,'0')).join(' ')}`).replace(/\s+/g,' ').trim();
  pushTrace && pushTrace({ dir: 'TX', canId: '0x7E0', data: tx, note: `WriteDataByIdentifier (${reason})` });

  // Simulation: interpret first two bytes as big-endian counter value and store in ECU ref
  await new Promise(res => setTimeout(res, 650));
  if (bytes.length >= 2) {
    const v = (bytes[0] << 8) | bytes[1];
    ecuNvmSaveCycleRef.current = v;
  }
  const rx = (`6E ${did}`).replace(/\s+/g,' ').trim();
  pushTrace && pushTrace({ dir: 'RX', canId: '0x7E8', data: rx, note: 'Positive response' });
  setNvmWriteStatus(`OK (${rx})`);
  setNvmWriting(false);
  // After write, immediately read back using 0x22
  await readNvmSaveCycle('After write');
 }
function runOp(opIdx, log) {
  const ops = opsRef.current;
  if (opIdx >= ops.length) {
   setRunning(false);
   setFlashOp && setFlashOp(o => ({ ...o, running: false, progress: 100 }));
   pushTrace && pushTrace({ dir: "EVT", canId: "—", data: "—", note: "Multi-flash sequence completed" });
   return;
  }

  const swFile = ops[opIdx];
  setCurrent(opIdx + 1);
  setProgress(0);
  setElapsedMs(0);
  startRef.current = Date.now();

  setFlashOp && setFlashOp({ running: true, swFile, cycle: opIdx + 1, total: ops.length, progress: 0, elapsedMs: 0 });
  pushTrace && pushTrace({ dir: "EVT", canId: "—", data: swFile, note: `Flashing started (${opIdx + 1}/${ops.length})` });

  let p = 0;
  timerRef.current = setInterval(() => {
   p += Math.random() * 4 + 1;
   const clamped = Math.min(p, 99);
   const ems = Date.now() - startRef.current;

   setProgress(clamped);
   setElapsedMs(ems);
   setFlashOp && setFlashOp({ running: true, swFile, cycle: opIdx + 1, total: ops.length, progress: clamped, elapsedMs: ems });

   if (p >= 100) {
    clearInterval(timerRef.current);

    const ok = Math.random() > 0.15;
    const entry = { id: Date.now(), swFile, timestamp: now(), duration: fmtMs(Date.now() - startRef.current), status: ok ? "success" : "failed" };
    const newLog = [...log, entry];

    setSessionLog(newLog);
    setFlashLog(l => [entry, ...l]);
    setFlashCount(c => c + 1);
 ecuNvmSaveCycleRef.current = Number(ecuNvmSaveCycleRef.current ?? 0) + 1;
 
 pushTrace && pushTrace({ dir: "EVT", canId: "—", data: "—", note: "ECU NVM save cycle updated" });
 if (nvmAutoRead) readNvmSaveCycle("Auto (after flash)");

    setProgress(100);
    setFlashOp && setFlashOp({ running: true, swFile, cycle: opIdx + 1, total: ops.length, progress: 100, elapsedMs: Date.now() - startRef.current });
    pushTrace && pushTrace({ dir: "EVT", canId: "—", data: swFile, note: ok ? "Flashing completed (success)" : "Flashing completed (failed)" });

    setTimeout(() => runOp(opIdx + 1, newLog), 600);
   }
  }, 120);
 }

function NvmData() {
  const [data, setData]             = useState(null);
  const [reading, setReading]       = useState(false);
  const [filter, setFilter]         = useState("");
  const [writeAddr, setWriteAddr]   = useState("");
  const [writeVal, setWriteVal]     = useState("");
  const [writeLog, setWriteLog]     = useState([]);

  function readAll() { setReading(true); setTimeout(() => { setData(MOCK_NVM_DATA); setReading(false); }, 1500); }
  function writeNVM() {
    if (!writeAddr || !writeVal) return;
    const entry = { ts: now(), addr: writeAddr, val: writeVal };
    setWriteLog(l => [entry, ...l].slice(0, 10));
    if (data) setData(d => d.map(r => r.address === writeAddr ? { ...r, value: writeVal, raw: writeVal.replace("0x","").match(/.{1,2}/g)?.join(" ") ?? writeVal } : r));
    setWriteAddr(""); setWriteVal("");
  }
  const filtered = (data ?? []).filter(r => !filter || r.label.toLowerCase().includes(filter.toLowerCase()) || r.address.toLowerCase().includes(filter.toLowerCase()));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <h2 style={{ color: "#f1f5f9", margin: 0, fontSize: 20, fontWeight: 700 }}>NVM Data</h2>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 16 }}>
        <Card>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <SectionLabel style={{ flex: 1, margin: 0 }}>NVM Memory Map</SectionLabel>
            <MonoInput value={filter} onChange={e => setFilter(e.target.value)} placeholder="Filter…" style={{ width: 130 }} />
            <Btn onClick={readAll} disabled={reading}>{reading ? "Reading…" : "Read All"}</Btn>
          </div>
          {!data && !reading && <div style={{ textAlign: "center", color: "#475569", fontSize: 13, padding: 30 }}>Click "Read All" to fetch NVM data from ECU.</div>}
          {reading && <div className="animate-pulse" style={{ textAlign: "center", color: "#475569", fontSize: 13, padding: 30 }}>Reading NVM from ECU…</div>}
          {data && (
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ color: "#64748b", borderBottom: "1px solid #334155" }}>
                  {["Address","Label","Value","Raw Bytes"].map(h => <th key={h} style={{ textAlign: "left", padding: "6px 12px 6px 0", fontWeight: 500, fontSize: 11 }}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => (
                  <tr key={r.address} style={{ borderBottom: "1px solid rgba(51,65,85,0.4)", color: "#cbd5e1" }}>
                    <td style={{ padding: "7px 12px 7px 0", fontFamily: "monospace", fontSize: 11, color: "#93c5fd" }}>{r.address}</td>
                    <td style={{ padding: "7px 12px 7px 0", fontSize: 12 }}>{r.label}</td>
                    <td style={{ padding: "7px 12px 7px 0", fontFamily: "monospace", fontSize: 11, color: "#6ee7b7" }}>{r.value}</td>
                    <td style={{ padding: "7px 0", fontFamily: "monospace", fontSize: 11, color: "#64748b" }}>{r.raw}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </Card>
        <Card style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <SectionLabel>Write NVM</SectionLabel>
          <div>
            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>Address</div>
            <MonoInput value={writeAddr} onChange={e => setWriteAddr(e.target.value)} placeholder="0x0000" />
          </div>
          <div>
            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>Value</div>
            <MonoInput value={writeVal} onChange={e => setWriteVal(e.target.value)} placeholder="0xABCD" />
          </div>
          <Btn onClick={writeNVM} disabled={!writeAddr || !writeVal} color="#92400e" style={{ width: "100%" }}>Write NVM</Btn>
          <div style={{ borderTop: "1px solid #334155", paddingTop: 10 }}>
            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 6 }}>Write Log</div>
            {writeLog.length === 0
              ? <div style={{ fontSize: 11, color: "#475569" }}>No writes yet.</div>
              : writeLog.map((e, i) => (
                <div key={i} style={{ fontSize: 11, fontFamily: "monospace", color: "#94a3b8", borderBottom: "1px solid rgba(51,65,85,0.5)", padding: "4px 0" }}>
                  <span style={{ color: "#475569" }}>{e.ts.split(" ")[1]}</span>{" "}
                  <span style={{ color: "#93c5fd" }}>{e.addr}</span>{" ← "}
                  <span style={{ color: "#6ee7b7" }}>{e.val}</span>
                </div>
              ))
            }
          </div>
        </Card>
      </div>
    </div>
  );
}

// ─── INTERRUPTION TESTS ───────────────────────────────────────────────────────
function InterruptionTests({ flashLog, setFlashLog, flashCount, setFlashCount }) {
  const [tests, setTests]       = useState(MOCK_INTERRUPTION_TESTS);
  const [lastResult, setLast]   = useState(null);
  const [running, setRunning]   = useState(null);
  const [progress, setProgress] = useState(0);

  function runTest(id) {
    setRunning(id); setProgress(0); setLast(null);
    let p = 0;
    const iv = setInterval(() => {
      p += Math.random() * 6 + 2;
      setProgress(Math.min(p, 95));
      if (p >= 95) {
        clearInterval(iv);
        const interrupted = Math.random() > 0.4;
        const result = interrupted ? "interrupted" : "failed";
        setTests(ts => ts.map(t => t.id === id ? { ...t, status: result } : t));
        const entry = { id: Date.now(), swFile: "SW_ECU_v3.4.2.hex (Interruption)", timestamp: now(), duration: "~1m 20s", status: "failed" };
        setFlashLog(l => [entry, ...l]);
        setFlashCount(c => c + 1);
        setLast({ testId: id, result, interrupted });
        setRunning(null); setProgress(100);
      }
    }, 100);
  }
  function runAll() { tests.forEach((t, i) => setTimeout(() => runTest(t.id), i * 3500)); }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <h2 style={{ color: "#f1f5f9", margin: 0, fontSize: 20, fontWeight: 700 }}>Flashing Interruption Tests</h2>

      {lastResult && (
        <div style={{ background: lastResult.interrupted ? "rgba(234,88,12,0.1)" : "rgba(220,38,38,0.1)", border: `1px solid ${lastResult.interrupted ? "#ea580c" : "#dc2626"}`, borderRadius: 12, padding: 16, display: "flex", alignItems: "center", gap: 14 }}>
          <span style={{ fontSize: 30 }}>{lastResult.interrupted ? "⚡" : "✗"}</span>
          <div>
            <div style={{ fontWeight: 700, fontSize: 13, color: lastResult.interrupted ? "#fdba74" : "#fca5a5" }}>
              {lastResult.interrupted ? "Interruption Detected — ECU Responded Correctly" : "Flash Failed — No Interruption Detected"}
            </div>
            <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>
              {lastResult.interrupted ? "Negative Response (NRC 0x70 / 0x72) received — interruption test PASSED" : "Unexpected failure — check ECU logs"}
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <div style={{ background: "rgba(16,185,129,0.08)", border: "1px solid rgba(16,185,129,0.3)", borderRadius: 12, padding: 16, display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 24 }}>✅</span>
          <div>
            <div style={{ color: "#34d399", fontWeight: 700, fontSize: 13 }}>Positive Response</div>
            <div style={{ fontSize: 11, color: "#94a3b8" }}>0x78 / 0x67 — Flash completed successfully</div>
          </div>
        </div>
        <div style={{ background: "rgba(220,38,38,0.08)", border: "1px solid rgba(220,38,38,0.3)", borderRadius: 12, padding: 16, display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 24 }}>❌</span>
          <div>
            <div style={{ color: "#f87171", fontWeight: 700, fontSize: 13 }}>Negative Response</div>
            <div style={{ fontSize: 11, color: "#94a3b8" }}>NRC 0x70 / 0x72 — Flash failed or interrupted</div>
          </div>
        </div>
      </div>

      <Card>
        <div style={{ display: "flex", alignItems: "center", marginBottom: 14 }}>
          <SectionLabel style={{ flex: 1, margin: 0 }}>Test Cases</SectionLabel>
          <Btn onClick={runAll} disabled={running !== null} color="#c2410c">Run All Tests</Btn>
        </div>
        {running && (
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#94a3b8", marginBottom: 4 }}>
              <span>Running test #{running}…</span><span>{Math.round(progress)}%</span>
            </div>
            <div style={{ width: "100%", background: "#334155", borderRadius: 9999, height: 8 }}>
              <div style={{ width: `${progress}%`, height: 8, background: "#f97316", borderRadius: 9999, transition: "width 0.1s" }} />
            </div>
          </div>
        )}
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {tests.map(t => (
            <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 12, background: "#0f172a", borderRadius: 8, padding: "10px 14px", border: "1px solid #334155" }}>
              <span style={{ fontSize: 11, color: "#475569", width: 16 }}>{t.id}</span>
              <span style={{ flex: 1, fontSize: 13, color: "#cbd5e1" }}>{t.name}</span>
              <Badge type={running === t.id ? "running" : t.status} />
              <Btn onClick={() => runTest(t.id)} disabled={running !== null} color="#334155" style={{ padding: "4px 12px", fontSize: 11 }}>Run</Btn>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <SectionLabel>Recent Flash Results</SectionLabel>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ color: "#64748b", borderBottom: "1px solid #334155" }}>
              {["SW File","Timestamp","Duration","Result"].map(h => <th key={h} style={{ textAlign: "left", padding: "6px 12px 6px 0", fontWeight: 500, fontSize: 11 }}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {flashLog.slice(0, 6).map(e => (
              <tr key={e.id} style={{ borderBottom: "1px solid rgba(51,65,85,0.4)", color: "#cbd5e1" }}>
                <td style={{ padding: "7px 12px 7px 0", fontFamily: "monospace", fontSize: 11 }}>{e.swFile}</td>
                <td style={{ padding: "7px 12px 7px 0", fontSize: 11 }}>{e.timestamp}</td>
                <td style={{ padding: "7px 12px 7px 0" }}>{e.duration}</td>
                <td style={{ padding: "7px 0" }}><Badge type={e.status} /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ─── CAN TRACE ───────────────────────────────────────────────────────────────
function CanTrace({ canTrace, setCanTrace }) {
 const [q, setQ] = useState("");
 const [showTX, setShowTX] = useState(true);
 const [showRX, setShowRX] = useState(true);
 const [showEVT, setShowEVT] = useState(true);
 const [autoScroll, setAutoScroll] = useState(true);
 const wrapRef = useRef(null);

 const filtered = canTrace.filter(f => {
  if (!showTX && f.dir === "TX") return false;
  if (!showRX && f.dir === "RX") return false;
  if (!showEVT && f.dir === "EVT") return false;
  if (!q) return true;
  const hay = `${f.ts} ${f.dir} ${f.canId} ${f.data} ${f.note}`.toLowerCase();
  return hay.includes(q.toLowerCase());
 });

 useEffect(() => {
  if (!autoScroll) return;
  const el = wrapRef.current;
  if (el) el.scrollTop = el.scrollHeight;
 }, [filtered.length, autoScroll]);

 function clearAll() { setCanTrace([]); }

 function exportLog() {
  const lines = canTrace.map(f => `${f.ts}\t${f.dir}\t${f.canId}\t${f.data}\t${f.note || ""}`);
  const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `can_trace_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.log`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
 }

 async function copyLog() {
  const lines = filtered.map(f => `${f.ts}\t${f.dir}\t${f.canId}\t${f.data}\t${f.note || ""}`);
  try { await navigator.clipboard.writeText(lines.join("\n")); } catch (e) {}
 }

 const dirColor = (d) => d === "TX" ? "#fde68a" : d === "RX" ? "#6ee7b7" : "#93c5fd";

 return (
  <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
   <h2 style={{ color: "#f1f5f9", margin: 0, fontSize: 20, fontWeight: 700 }}>Full CAN Trace</h2>

   <Card>
    <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
     <div style={{ flex: 1, minWidth: 220 }}>
      <MonoInput value={q} onChange={e => setQ(e.target.value)} placeholder="Filter by time / ID / data / note…" />
     </div>
     <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "#94a3b8" }}><input type="checkbox" checked={showTX} onChange={e => setShowTX(e.target.checked)} /> TX</label>
     <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "#94a3b8" }}><input type="checkbox" checked={showRX} onChange={e => setShowRX(e.target.checked)} /> RX</label>
     <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "#94a3b8" }}><input type="checkbox" checked={showEVT} onChange={e => setShowEVT(e.target.checked)} /> EVT</label>
     <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "#94a3b8" }}><input type="checkbox" checked={autoScroll} onChange={e => setAutoScroll(e.target.checked)} /> Auto-scroll</label>
     <Btn onClick={copyLog} color="#334155" style={{ padding: "8px 12px" }}>Copy</Btn>
     <Btn onClick={exportLog} color="#334155" style={{ padding: "8px 12px" }}>Export</Btn>
     <Btn onClick={clearAll} color="#7f1d1d" style={{ padding: "8px 12px" }}>Clear</Btn>
    </div>
   </Card>

   <Card style={{ padding: 0 }}>
    <div style={{ padding: "12px 16px", borderBottom: "1px solid #334155", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
     <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.15em", color: "#64748b", textTransform: "uppercase" }}>Trace Frames</div>
     <div style={{ fontSize: 11, color: "#475569" }}>{filtered.length} / {canTrace.length}</div>
    </div>

    <div ref={wrapRef} style={{ maxHeight: 520, overflow: "auto" }}>
     <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
      <thead>
       <tr style={{ color: "#64748b", borderBottom: "1px solid #334155", position: "sticky", top: 0, background: "#1e293b" }}>
        {['Time','Dir','CAN ID','Data','Note'].map(h => (
         <th key={h} style={{ textAlign: "left", padding: "10px 14px", fontWeight: 500, fontSize: 11 }}>{h}</th>
        ))}
       </tr>
      </thead>
      <tbody>
       {filtered.length === 0
        ? <tr><td colSpan={5} style={{ textAlign: "center", color: "#475569", padding: 18, fontSize: 13 }}>No frames to display.</td></tr>
        : filtered.map((f, i) => (
         <tr key={f.id || i} style={{ borderBottom: "1px solid rgba(51,65,85,0.4)", color: "#cbd5e1" }}>
          <td style={{ padding: "8px 14px", fontSize: 11, color: "#475569", whiteSpace: "nowrap" }}>{f.ts}</td>
          <td style={{ padding: "8px 14px", fontFamily: "monospace", color: dirColor(f.dir), fontWeight: 700 }}>{f.dir}</td>
          <td style={{ padding: "8px 14px", fontFamily: "monospace", color: "#93c5fd", whiteSpace: "nowrap" }}>{f.canId}</td>
          <td style={{ padding: "8px 14px", fontFamily: "monospace", color: "#e2e8f0" }}>{f.data}</td>
          <td style={{ padding: "8px 14px", fontSize: 11, color: "#94a3b8" }}>{f.note}</td>
         </tr>
        ))
       }
      </tbody>
     </table>
    </div>
   </Card>
  </div>
 );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
 const [active, setActive] = useState("dashboard");
 const [flashCount, setFlashCount] = useState(INITIAL_FLASH_LOG.length);
 const [flashLog, setFlashLog] = useState(INITIAL_FLASH_LOG);

 const [flashOp, setFlashOp] = useState({ running: false, swFile: "—", cycle: 0, total: 0, progress: 0, elapsedMs: 0 });
 const [canTrace, setCanTrace] = useState([]);

 function pushTrace(frame) {
  const f = {
   id: frame.id || (Date.now() + Math.random()),
   ts: frame.ts || now(),
   dir: frame.dir || "EVT",
   canId: frame.canId || "—",
   data: frame.data || "—",
   note: frame.note || ""
  };
  setCanTrace(t => [...t, f].slice(-5000));
 }

 const pages = {
  dashboard: <Dashboard flashCount={flashCount} flashOp={flashOp} />,
  multiflash: <MultiFlash flashCount={flashCount} setFlashCount={setFlashCount} setFlashLog={setFlashLog} setFlashOp={setFlashOp} pushTrace={pushTrace} />,
  nvm: <NvmData />,
  flashlog: <FlashLog flashLog={flashLog} />,
  interruption: <InterruptionTests flashLog={flashLog} setFlashLog={setFlashLog} flashCount={flashCount} setFlashCount={setFlashCount} />,
  cantrace: <CanTrace canTrace={canTrace} setCanTrace={setCanTrace} />,
 };

 return (
  <div style={{ display: "flex", minHeight: "100vh", background: "#020617", color: "#f1f5f9" }}>
   <Sidebar active={active} setActive={setActive} />
   <main style={{ flex: 1, padding: 32, overflowY: "auto" }}>
    {pages[active]}
   </main>
  </div>
 );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
